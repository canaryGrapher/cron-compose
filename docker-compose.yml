services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: croncompose
      POSTGRES_PASSWORD: croncompose
      POSTGRES_DB: croncompose
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croncompose"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
