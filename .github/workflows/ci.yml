name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [control-plane, agent, proto, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

  integration:
    name: Control plane integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: croncompose
          POSTGRES_PASSWORD: croncompose
          POSTGRES_DB: croncompose_it
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U croncompose"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: control-plane/go.sum
      - name: integration test
        working-directory: control-plane
        env:
          INTEGRATION_DB_URL: postgres://croncompose:croncompose@localhost:5432/croncompose_it?sslmode=disable
        run: go test -tags integration ./internal/api -run TestRESTRoundTrip -v

  web:
    name: Web typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        # No lockfile yet, so install without ci. CI runs after the first dev run.
        run: npm install --no-audit --no-fund

      - name: typecheck
        working-directory: web
        run: npx tsc --noEmit
