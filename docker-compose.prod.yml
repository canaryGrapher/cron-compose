# Production-shaped docker-compose. Brings up Postgres, the control plane, and the web
# UI behind a shared network. Override defaults by exporting env vars or copying the
# block under x-env into a `.env` file.

x-env: &cp-env
  DATABASE_URL: postgres://croncompose:croncompose@postgres:5432/croncompose?sslmode=disable
  HTTP_ADDR: ":8080"
  GRPC_ADDR: ":9090"
  TLS_DIR: /home/ccompose/tls
  TLS_HOSTS: ${TLS_HOSTS:-localhost,control-plane}
  SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?set SEED_ADMIN_EMAIL in .env}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set SEED_ADMIN_PASSWORD in .env}
  LOG_LEVEL: info

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: croncompose
      POSTGRES_PASSWORD: croncompose
      POSTGRES_DB: croncompose
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croncompose"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: control-plane/Dockerfile
    environment:
      <<: *cp-env
    volumes:
      - cp-tls:/home/ccompose/tls
    ports:
      - "8080:8080"  # REST (put nginx in front in real prod)
      - "9090:9090"  # mTLS gRPC for agents
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      API_BASE: http://control-plane:8080/api/v1
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - control-plane

volumes:
  pgdata:
  cp-tls:
